services:

  mysql:
    image: mysql:8.0

    command:
      - --innodb-buffer-pool-size=128M

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: smart_canteen_db

    ports:
      - "3307:3306"

    volumes:
      - mysql-data:/var/lib/mysql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 20s
      retries: 10

  backend:
    image: budihale/smart-canteen-backend:v3

    container_name: springboot-app

    environment:
      JAVA_OPTS: "-Xms128m -Xmx384m"

    ports:
      - "8080:8080"

    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    image: budihale/smart-canteen-frontend:v3

    container_name: react-app

    ports:
      - "5173:5173"

    depends_on:
      - backend

volumes:
  mysql-data: